app = "agentifier-__projectName__"
primary_region = "__region__"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "__vmMemory__"
  cpu_kind = "__vmCpuKind__"
  cpus = __vmCpus__
